{% extends "base.html" %}
{% block title %}Monthly Summary — Farm Receipt Manager{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-bar-chart-line me-2 text-success"></i>Monthly Summary</h2>

<div class="row mb-4">
  <div class="col-lg-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <canvas id="spendChart" height="300"></canvas>
      </div>
    </div>
  </div>
  <div class="col-lg-4">
    <div class="card shadow-sm h-100">
      <div class="card-header bg-success text-white">
        <strong>Monthly Totals</strong>
      </div>
      <div class="card-body p-0">
        <table class="table table-sm table-hover mb-0" id="summaryTable">
          <thead class="table-light">
            <tr><th>Month</th><th class="text-center">Receipts</th><th class="text-end">Total</th></tr>
          </thead>
          <tbody id="summaryBody">
            <tr><td colspan="3" class="text-center text-muted py-3">
              <span class="spinner-border spinner-border-sm"></span> Loading...
            </td></tr>
          </tbody>
          <tfoot id="summaryFoot"></tfoot>
        </table>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script src="/static/js/summary.js"></script>
{% endblock %}
