<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Farmers Helper{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/">
      <i class="bi bi-flower1 me-2"></i>Farmers Helper
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/receipts' %}active{% endif %}" href="/receipts">
            <i class="bi bi-receipt me-1"></i>Receipts
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/summary' %}active{% endif %}" href="/summary">
            <i class="bi bi-bar-chart-line me-1"></i>Monthly Summary
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/programs' %}active{% endif %}" href="/programs">
            <i class="bi bi-award me-1"></i>Farm Programs
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/almanac' %}active{% endif %}" href="/almanac">
            <i class="bi bi-moon-stars me-1"></i>Almanac
          </a>
        </li>
      </ul>
      <a href="/api/export" class="btn btn-outline-light btn-sm">
        <i class="bi bi-file-earmark-excel me-1"></i>Export to Excel
      </a>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">
  {% block content %}{% endblock %}
</div>

<!-- Toast container -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
  <div id="appToast" class="toast align-items-center border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMessage"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(message, type) {
  const toast = document.getElementById('appToast');
  const msg = document.getElementById('toastMessage');
  msg.textContent = message;
  toast.className = 'toast align-items-center border-0 text-bg-' + (type || 'success');
  new bootstrap.Toast(toast, {delay: 4000}).show();
}
function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
